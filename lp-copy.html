<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Review Decision — Landing Page Pipeline</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5F7;
            color: #22252A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #005B5C;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #6C727F;
            margin-bottom: 24px;
        }
        .info {
            background: #E6F3F3;
            border-left: 3px solid #005B5C;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            color: #22252A;
            text-align: left;
        }
        .info strong { color: #005B5C; }
        .error {
            background: #fef0f0;
            border-left: 3px solid #E05454;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: #22252A;
            display: none;
            text-align: left;
        }
        .button-row {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
            font-family: inherit;
        }
        button:active { transform: scale(0.98); }
        .approve {
            background: #3BAF7A;
            color: #fff;
        }
        .approve:hover { background: #2F9966; }
        .reject {
            background: #fff;
            color: #E05454;
            border: 1px solid #E05454;
        }
        .reject:hover { background: #fef0f0; }
        button:disabled { background: #ccc; color: #fff; cursor: not-allowed; border: none; }
        .success {
            background: #E8F5E9;
            border-left: 3px solid #3BAF7A;
            padding: 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #22252A;
            display: none;
            margin-top: 16px;
        }
        .success.reject-style {
            background: #fef0f0;
            border-left-color: #E05454;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Copy review decision</h1>
        <p class="subtitle">Confirm whether to proceed with image generation or stop this run.</p>

        <div class="info">
            <strong>Execution:</strong> <span id="exec-label">—</span>
        </div>

        <div class="error" id="error-box"></div>

        <div class="button-row" id="button-row">
            <button class="approve" id="approve-btn">&#10003; Approve copy &amp; generate images</button>
            <button class="reject" id="reject-btn">&#10005; Reject &amp; stop this run</button>
        </div>

        <div class="success" id="success-box">
            Submitted. You can close this window.
        </div>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var exec = params.get('exec');
        var execLabel = document.getElementById('exec-label');
        var errorBox = document.getElementById('error-box');
        var buttonRow = document.getElementById('button-row');
        var successBox = document.getElementById('success-box');
        var approveBtn = document.getElementById('approve-btn');
        var rejectBtn = document.getElementById('reject-btn');

        if (!exec) {
            errorBox.textContent = 'Missing exec parameter in the URL. Use the link from Slack.';
            errorBox.style.display = 'block';
            approveBtn.disabled = true;
            rejectBtn.disabled = true;
        } else {
            execLabel.textContent = exec;
        }

        function submitDecision(decision) {
            var webhookUrl = 'https://primary-production-77e0.up.railway.app/webhook-waiting/'
                + encodeURIComponent(exec)
                + '?copy=' + encodeURIComponent(decision);

            approveBtn.disabled = true;
            rejectBtn.disabled = true;
            approveBtn.textContent = decision === 'approve' ? 'Submitting…' : '\u2713 Approve copy & generate images';
            rejectBtn.textContent = decision === 'reject' ? 'Submitting…' : '\u2715 Reject & stop this run';

            fetch(webhookUrl, { method: 'GET', mode: 'no-cors' })
                .then(function() {
                    buttonRow.style.display = 'none';
                    successBox.textContent = decision === 'approve'
                        ? '\u2713 Approved. Image generation has started — you can close this window.'
                        : '\u2715 Rejected. The run has been stopped — you can close this window.';
                    if (decision === 'reject') successBox.classList.add('reject-style');
                    successBox.style.display = 'block';
                })
                .catch(function(err) {
                    errorBox.textContent = 'Failed to submit: ' + err.message;
                    errorBox.style.display = 'block';
                    approveBtn.disabled = false;
                    rejectBtn.disabled = false;
                    approveBtn.textContent = '\u2713 Approve copy & generate images';
                    rejectBtn.textContent = '\u2715 Reject & stop this run';
                });
        }

        approveBtn.addEventListener('click', function() { submitDecision('approve'); });
        rejectBtn.addEventListener('click', function() { submitDecision('reject'); });
    </script>
</body>
</html>
